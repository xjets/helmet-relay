<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HST Session Monitor</title>
  <style>
    @font-face {
      font-family: 'MainframeCyrillic';
      src: url('/fonts/mainframe-opto-cyrillic.woff2') format('woff2');
      font-weight: normal; font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #ccc; font-family: 'MainframeCyrillic', monospace; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; }

    /* Right panel — mesh toggles */
    #ui {
      position: fixed; top: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    }

    /* Top-centre status indicator */
    #status {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 10;
    }

    /* Left panel — curves toggle */
    #ui-left {
      position: fixed; top: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
    }

    #status-inner {
      display: flex; align-items: center; gap: 6px;
      background: #222; border: 1px solid #444;
      padding: 6px 10px; font-size: 11px; letter-spacing: 0.05em;
    }
    #status-dot {
      width: 1em; height: 1em; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }

    /* Base button */
    button {
      background: #1e1e1e; border: 1px solid #2a2a2a; color: #555;
      padding: 8px 14px; font-family: inherit; font-size: 11px;
      cursor: default; letter-spacing: 0.08em;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      min-width: 100px;
      display: flex; align-items: center; gap: 8px;
    }

    /* Dot indicator — left side of button */
    button .dot {
      width: 0.65em; height: 0.65em; border-radius: 50%;
      flex-shrink: 0; background: #555;
      transition: background 0.2s;
    }
    button .label { flex: 1; text-align: left; }

    /* Populated + visible — green */
    button.populated {
      color: #8fc8a0; border-color: #4a7a5a; background: #1e2620; cursor: pointer;
    }
    button.populated .dot { background: #8fc8a0; }
    button.populated:hover { background: #222e24; border-color: #6aaa7a; }

    /* Populated + hidden — pale yellow */
    button.populated.hidden-mesh {
      color: #c8b870; border-color: #5a4e28; background: #201e10; cursor: pointer;
    }
    button.populated.hidden-mesh .dot { background: #c8b870; }
    button.populated.hidden-mesh:hover { border-color: #8a7a40; }

    /* Left-side buttons share min-width */
    #ui-left button { min-width: 130px; }

    /* Download — no dot, centred */
    #dl-btn { justify-content: center; }

    /* ── Pick buttons — fixed lower-left vertical column ────────────────────── */
    #pick-buttons {
      position: fixed; bottom: 20px; left: 16px; z-index: 20;
      display: none; flex-direction: column; gap: 6px;
    }
    #pick-buttons.visible { display: flex; }
    .pick-btn {
      width: 42px; height: 42px; min-width: unset; padding: 0;
      justify-content: center; align-items: center;
      background: #1e1e1e; border: 1px solid #2a2a2a;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .pick-btn:hover  { background: #252525; border-color: #444; }
    .pick-btn.active { background: #1a1000; cursor: crosshair; }
    .pick-btn.placed { background: #151515; }
    #pick-a.active { border-color: #ff3030; box-shadow: 0 0 6px #ff303066; }
    #pick-b.active { border-color: #33ff66; box-shadow: 0 0 6px #33ff6666; }
    #pick-c.active { border-color: #4499ff; box-shadow: 0 0 6px #4499ff66; }
    #pick-a.placed { border-color: #882020; }
    #pick-b.placed { border-color: #208840; }
    #pick-c.placed { border-color: #204488; }
    /* Portrait: hamburger moves to lower-left, pick buttons shift right */
    @media (orientation: portrait) {
      #pick-buttons { left: auto; right: 16px; }
    }

    /* Curves — has dot, uses same green/yellow as right buttons
       but yellow is 10% more faded than mesh buttons */
    #curves-toggle.populated.hidden-mesh {
      color: #a8924e; border-color: #423816; background: #1a1608; cursor: pointer;
    }
    #curves-toggle.populated.hidden-mesh .dot { background: #a8924e; }

    #waiting {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 13px; letter-spacing: 0.1em; color: #555;
      pointer-events: none;
    }

    /* Bottom centre — alpha slider + matcap bar */
    #bottom-centre {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; align-items: stretch;
    }

    #alpha-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(20,20,20,0.75); border: 1px solid #333;
      padding: 8px 14px; backdrop-filter: blur(4px);
    }
    #alpha-row label { font-size: 11px; letter-spacing: 0.08em; color: #888; white-space: nowrap; }
    #alpha-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px; background: #444; border-radius: 2px; outline: none; cursor: pointer;
    }
    #alpha-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #ccc; cursor: pointer;
    }
    #alpha-slider::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: #ccc; cursor: pointer; border: none;
    }
    #alpha-value { font-size: 11px; color: #666; width: 28px; text-align: right; }

    #matcap-bar {
      display: flex; gap: 10px; align-items: center;
      background: rgba(20,20,20,0.75); border: 1px solid #333;
      padding: 10px 14px; backdrop-filter: blur(4px);
    }
    .swatch {
      width: 48px; height: 48px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      background-size: cover; background-position: center;
      transition: border-color 0.15s, transform 0.15s;
    }
    .swatch:hover { transform: scale(1.12); border-color: #888; }
    .swatch.active { border-color: #fff; }

    /* Hamburger — desktop: lower-right */
    #hamburger {
      position: fixed; bottom: 20px; right: 16px; z-index: 20;
      background: #1e1e1e; border: 1px solid #2a2a2a; color: #555;
      padding: 10px 12px; cursor: pointer;
      display: flex; flex-direction: column; gap: 4px;
      min-width: auto; transition: color 0.2s, border-color 0.2s;
    }
    #hamburger .bar {
      display: block; width: 18px; height: 2px;
      background: currentColor; border-radius: 1px;
    }
    #hamburger:hover { color: #888; border-color: #444; }
    #hamburger.panels-hidden { color: #444; border-color: #222; }

    /* Mobile portrait — full-width bottom bar, hamburger lower-left */
    @media (orientation: portrait) {
      #bottom-centre {
        left: 16px; right: 16px; transform: none;
      }
      #matcap-bar { flex-wrap: wrap; }
      #hamburger  { right: auto; left: 16px; }
    }

    /* ── Welcome overlay ───────────────────────────────────────────────────── */
    #welcome-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    #welcome-box {
      background: #000; border: 1px solid #444; border-radius: 12px;
      padding: 36px 40px;
      display: flex; flex-direction: column; gap: 18px;
      overflow-y: auto;
      /* PC default */
      width: 500px; max-height: 600px;
      cursor: default;
    }
    #welcome-text {
      font-size: 13px; line-height: 1.8; letter-spacing: 0.04em;
      color: #33ff33; text-align: center;
      white-space: pre-wrap;   /* preserves \n line breaks from Grasshopper panel */
    }
    #welcome-hint { font-size: 10px; color: #1a991a; letter-spacing: 0.08em; text-align: center; margin-top: 8px; }

    /* Portrait mobile */
    @media (orientation: portrait) and (max-width: 768px) {
      #welcome-box { width: 78vw; max-height: 50vh; }
    }
    /* Landscape mobile */
    @media (orientation: landscape) and (max-height: 500px) {
      #welcome-box { width: 43vw; max-height: 70vh; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="waiting">WAITING FOR MODEL</div>

  <!-- Top centre: connection status -->
  <div id="status"><div id="status-inner"><span id="status-dot"></span><span id="status-text">STANDBY</span></div></div>

  <!-- Right panel: mesh toggles -->
  <div id="ui">
    <button id="btn-shell"   ><span class="dot"></span><span class="label">SHELL</span></button>
    <button id="btn-crumple" ><span class="dot"></span><span class="label">CRUMPLE</span></button>
    <button id="btn-headform"><span class="dot"></span><span class="label">HEADFORM</span></button>
    <button id="btn-head"    ><span class="dot"></span><span class="label">HEAD</span></button>
    <button id="btn-iso-hf"  ><span class="dot"></span><span class="label">ISO HF</span></button>
  </div>

  <!-- Left panel: curves + download -->
  <div id="ui-left">
    <button id="curves-toggle"      ><span class="dot"></span><span class="label">SHOW CURVES</span></button>
    <button id="crumple-crvs-toggle"><span class="dot"></span><span class="label">SHOW CRUMPLE CRVS</span></button>
    <button id="select-pts-btn"><span class="dot"></span><span class="label">SELECT PTS</span></button>
    <button id="dl-btn">DOWNLOAD OBJ</button>
  </div>

  <!-- Hamburger toggle — panels (surfaces + curves) -->
  <button id="hamburger" title="Toggle panels">
    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
  </button>

  <!-- Welcome overlay -->
  <div id="welcome-overlay">
    <div id="welcome-box">
      <p id="welcome-text">HST Live Session Monitor</p>
      <div id="welcome-hint">click anywhere to close this window</div>
    </div>
  </div>

  <!-- Pick buttons — fixed lower-left, shown only when SELECT PTS active -->
  <div id="pick-buttons">
    <button id="pick-a" class="pick-btn" title="Pick point A">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="6" stroke="#ff3030" stroke-width="1.5"/>
        <line x1="11" y1="1" x2="11" y2="5"   stroke="#ff3030" stroke-width="1.5"/>
        <line x1="11" y1="17" x2="11" y2="21"  stroke="#ff3030" stroke-width="1.5"/>
        <line x1="1"  y1="11" x2="5"  y2="11"  stroke="#ff3030" stroke-width="1.5"/>
        <line x1="17" y1="11" x2="21" y2="11"  stroke="#ff3030" stroke-width="1.5"/>
      </svg>
    </button>
    <button id="pick-b" class="pick-btn" title="Pick point B">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="6" stroke="#33ff66" stroke-width="1.5"/>
        <line x1="11" y1="1" x2="11" y2="5"   stroke="#33ff66" stroke-width="1.5"/>
        <line x1="11" y1="17" x2="11" y2="21"  stroke="#33ff66" stroke-width="1.5"/>
        <line x1="1"  y1="11" x2="5"  y2="11"  stroke="#33ff66" stroke-width="1.5"/>
        <line x1="17" y1="11" x2="21" y2="11"  stroke="#33ff66" stroke-width="1.5"/>
      </svg>
    </button>
    <button id="pick-c" class="pick-btn" title="Pick point C">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="6" stroke="#4499ff" stroke-width="1.5"/>
        <line x1="11" y1="1" x2="11" y2="5"   stroke="#4499ff" stroke-width="1.5"/>
        <line x1="11" y1="17" x2="11" y2="21"  stroke="#4499ff" stroke-width="1.5"/>
        <line x1="1"  y1="11" x2="5"  y2="11"  stroke="#4499ff" stroke-width="1.5"/>
        <line x1="17" y1="11" x2="21" y2="11"  stroke="#4499ff" stroke-width="1.5"/>
      </svg>
    </button>
  </div>

  <!-- Bottom centre -->
  <div id="bottom-centre">
    <div id="alpha-row">
      <label>ALPHA</label>
      <input id="alpha-slider" type="range" min="25" max="100" value="82">
      <span id="alpha-value">0.82</span>
    </div>
    <div id="matcap-bar"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Line2 } from 'three/addons/lines/Line2.js';
    import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
    import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
    import { mergeVertices } from 'three/addons/utils/BufferGeometryUtils.js';

    // ─── Config ───────────────────────────────────────────────────────────────
    const MATCAPS = [
      'BaseMatCap_102.png',
      'BaseMatCap_106.png',
      'BaseMatCap_110.png',
      'BaseMatCap_111.png',
      'BaseMatCap_112.png',
      'BaseMatCap_115.png',
    ];
    const DEFAULT_MATCAP    = 2;   // BaseMatCap_110.png
    const DEFAULT_SHELL_ALPHA = 0.82;

    // Fixed matcap for head target
    const MATCAP_HEAD = 'BaseMatCap_102.png';

    const HEAD_DEFAULT_URL = '/mesh/AngularHead.obj';
    // ─────────────────────────────────────────────────────────────────────────

    // --- Scene ---
    const container = document.getElementById('canvas-container');
    const renderer  = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a); // placeholder until texture loads
    new THREE.TextureLoader().load('/images/RadialGray.jpg', tex => {
      scene.background = tex;
    });

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 0, -1000);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(1, 2, 2);
    scene.add(keyLight);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      // LineMaterial needs current resolution — update all curve sets
      Object.values(curveSets).forEach(s => {
        if (s.group) s.group.traverse(child => {
          if (child.isLine2) child.material.resolution.set(window.innerWidth, window.innerHeight);
        });
      });
    });

    // --- Texture loader ---
    const texLoader = new THREE.TextureLoader();

    // --- Materials ---
    // Shell: swatch-controlled + alpha slider
    const shellMaterial = new THREE.MeshMatcapMaterial({
      side: THREE.DoubleSide, transparent: true, opacity: DEFAULT_SHELL_ALPHA, fog: false,
    });

    function makeFixedMaterial(matcapName) {
      const mat = new THREE.MeshMatcapMaterial({ side: THREE.DoubleSide, fog: false });
      texLoader.load('/matcaps/' + matcapName, tex => { mat.matcap = tex; mat.needsUpdate = true; });
      return mat;
    }

    // Crumple — self-illuminated lime green (unlit) + black edge lines added on load
    const crumpleMaterial = new THREE.MeshBasicMaterial({
      color: 0x80FF00, side: THREE.DoubleSide, fog: false,
      polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1,
    });
    const crumpleEdgeMaterial = new THREE.LineBasicMaterial({ color: 0x000000, fog: false });

    // Headform — diagonal stripe shader
    const headformMaterial = new THREE.ShaderMaterial({
      transparent: true,
      side: THREE.DoubleSide,
      uniforms: {
        col_a:            { value: new THREE.Vector3(0.733, 0.870, 0.566) },
        col_a_alpha:      { value: 0.6 },
        col_b:            { value: new THREE.Vector3(0.351, 0.650, 0.500) },
        col_b_alpha:      { value: 0.68 },
        col_border:       { value: new THREE.Vector3(0.0, 0.0, 0.0) },
        col_border_alpha: { value: 1.0 },
        stripe_width:     { value: 8.0 },
        rotation:         { value: -45.0 },
      },
      vertexShader: `
        varying vec3 vWorldPos;
        void main() {
          vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vWorldPos;
        uniform vec3  col_a;
        uniform float col_a_alpha;
        uniform vec3  col_b;
        uniform float col_b_alpha;
        uniform vec3  col_border;
        uniform float col_border_alpha;
        uniform float stripe_width;
        uniform float rotation;

        void main() {
          float angle = rotation * 3.14159265359 / 180.0;
          // Project world position onto rotated axis
          float proj = vWorldPos.z * cos(angle) + vWorldPos.y * sin(angle);

          // Alternating A/B bands of equal width
          float t = mod(proj / stripe_width, 2.0);
          if (t < 0.0) t += 2.0;
          bool in_a = t < 1.0;

          // Distance from nearest stripe edge (world units)
          float edge_dist = mod(proj / stripe_width, 1.0);
          float dist_to_edge = min(edge_dist, 1.0 - edge_dist) * stripe_width;

          // Hairline anti-aliased border — adapts to screen resolution
          float fw = max(fwidth(proj) * 0.5, 0.25);
          float border_mix = smoothstep(0.0, fw, dist_to_edge);

          vec3  col   = in_a ? col_a   : col_b;
          float alpha = in_a ? col_a_alpha : col_b_alpha;

          col   = mix(col_border,       col,   border_mix);
          alpha = mix(col_border_alpha, alpha, border_mix);

          gl_FragColor = vec4(col, alpha);
        }
      `,
    });

    const headMaterial = makeFixedMaterial(MATCAP_HEAD);

    // ISO Headform — self-illuminating, no edges
    const isoHfAMaterial = new THREE.MeshStandardMaterial({
      color: 0x759092, emissive: 0x759092, emissiveIntensity: 0.25,
      metalness: 0.5, roughness: 0.25,
      transparent: false, side: THREE.DoubleSide, fog: false
    });
    const isoHfBMaterial = new THREE.MeshStandardMaterial({
      color: 0x5C5AA4, emissive: 0x5C5AA4, emissiveIntensity: 0.25,
      metalness: 0.5, roughness: 0.25,
      transparent: false, side: THREE.DoubleSide, fog: false
    });

    // --- Swatch bar (controls shell only) ---
    function applyMatcap(index) {
      texLoader.load('/matcaps/' + MATCAPS[index], tex => {
        shellMaterial.matcap = tex; shellMaterial.needsUpdate = true;
      });
      document.querySelectorAll('.swatch').forEach((el, i) =>
        el.classList.toggle('active', i === index));
    }

    const bar = document.getElementById('matcap-bar');
    MATCAPS.forEach((name, i) => {
      const div = document.createElement('div');
      div.className = 'swatch';
      div.style.backgroundImage = `url('/matcaps/${name}')`;
      div.title = name;
      div.addEventListener('click', () => applyMatcap(i));
      bar.appendChild(div);
    });
    applyMatcap(DEFAULT_MATCAP);

    // --- Alpha slider (shell only) ---
    const alphaSlider = document.getElementById('alpha-slider');
    const alphaValue  = document.getElementById('alpha-value');
    alphaSlider.addEventListener('input', () => {
      const val = alphaSlider.value / 100;   // min=25 → 0.25, max=100 → 1.00
      shellMaterial.opacity = val;
      shellMaterial.needsUpdate = true;
      alphaValue.textContent = val.toFixed(2);
    });

    // ── Mesh target system ────────────────────────────────────────────────────
    const loader = new OBJLoader();

    // One config object per target — keeps all state together
    const targets = {
      shell:      { root: null, visible: true,  populated: false, btn: document.getElementById('btn-shell'),   material: shellMaterial,   objString: null },
      crumple:    { root: null, visible: true,  populated: false, btn: document.getElementById('btn-crumple'), material: crumpleMaterial,  objString: null },
      headform:   { root: null, visible: true,  populated: false, btn: document.getElementById('btn-headform'),material: headformMaterial, objString: null },
      head:       { root: null, visible: true,  populated: false, btn: document.getElementById('btn-head'),    material: headMaterial,     objString: null },
      iso_hf_a:   { root: null, visible: true,  populated: false, btn: document.getElementById('btn-iso-hf'),  material: isoHfAMaterial,  objString: null, sharedBtn: true },
      iso_hf_b:   { root: null, visible: true,  populated: false, btn: document.getElementById('btn-iso-hf'),  material: isoHfBMaterial,  objString: null, sharedBtn: true },
    };

    function syncButton(t) {
      const btn = t.btn;
      btn.classList.toggle('populated',   t.populated);
      btn.classList.toggle('hidden-mesh', t.populated && !t.visible);
    }

    function loadMesh(key, objString) {
      const t = targets[key];
      if (t.root) scene.remove(t.root);

      const obj = loader.parse(objString);
      obj.traverse(child => {
        if (child.isMesh) {
          // Merge coincident vertices so normals average across faces → smooth shading
          child.geometry = mergeVertices(child.geometry);
          child.geometry.computeVertexNormals();
          child.material = t.material;
          // Crumple: overlay black edge lines as children (inherit visibility)
          if (key === 'crumple') {
            const edges = new THREE.EdgesGeometry(child.geometry, 5);
            child.add(new THREE.LineSegments(edges, crumpleEdgeMaterial));
          }
        }
      });
      obj.visible  = t.visible;
      scene.add(obj);

      t.root      = obj;
      t.populated = true;
      if (key === 'shell') t.objString = objString;

      if (key === 'iso_hf_a' || key === 'iso_hf_b') {
        syncIsoHfButton();
      } else {
        syncButton(t);
      }

      // Hide waiting message once any mesh arrives
      document.getElementById('waiting').style.display = 'none';
    }

    // Helper to sync shared ISO HF button based on both targets' states
    function syncIsoHfButton() {
      const a = targets.iso_hf_a, b = targets.iso_hf_b;
      const btn = a.btn;
      const anyPopulated = a.populated || b.populated;
      const allHidden = anyPopulated && !a.visible && !b.visible;
      btn.classList.toggle('populated', anyPopulated);
      btn.classList.toggle('hidden-mesh', allHidden);
    }

    // Wire toggle buttons (skip iso_hf_a/b as they share one button)
    Object.entries(targets).forEach(([key, t]) => {
      if (key === 'iso_hf_a' || key === 'iso_hf_b') return;
      t.btn.addEventListener('click', () => {
        if (!t.populated) return;
        t.visible = !t.visible;
        if (t.root) t.root.visible = t.visible;
        syncButton(t);
      });
    });

    // Special handler: ISO HF button toggles both iso_hf_a and iso_hf_b together
    const isoHfBtn = document.getElementById('btn-iso-hf');
    isoHfBtn.addEventListener('click', () => {
      const a = targets.iso_hf_a, b = targets.iso_hf_b;
      if (!a.populated && !b.populated) return;
      // Toggle both to the same state (opposite of current)
      const newState = !a.visible;
      a.visible = newState; if (a.root) a.root.visible = newState;
      b.visible = newState; if (b.root) b.root.visible = newState;
      syncIsoHfButton();
    });

    // Initialise all buttons to unpopulated state
    Object.values(targets).forEach(t => {
      if (t.sharedBtn) return;  // ISO HF handled separately
      syncButton(t);
    });
    syncIsoHfButton();

    // --- Download (shell OBJ) ---
    const dlBtn = document.getElementById('dl-btn');
    dlBtn.classList.add('populated');
    dlBtn.addEventListener('click', () => {
      const s = targets.shell.objString;
      if (!s) return;
      const blob = new Blob([s], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'helmet.obj';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // --- Load default Head mesh from file ---
    fetch(HEAD_DEFAULT_URL)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(text => loadMesh('head', text))
      .catch(err => console.warn('Head default load failed:', err));

    // ── Generic curve-set system ──────────────────────────────────────────────
    const DEPTH_NEAR =  150;   // world units toward camera → fully opaque
    const DEPTH_FAR  = -150;   // world units behind origin → fully transparent

    // Each set: { group, visible, lineData, btn, showLabel, hideLabel }
    const curveSets = {
      profile:     { group: null, visible: false, lineData: [], btn: document.getElementById('curves-toggle'),       showLabel: 'SHOW CURVES',        hideLabel: 'HIDE CURVES' },
      crumpleCrvs: { group: null, visible: false, lineData: [], btn: document.getElementById('crumple-crvs-toggle'), showLabel: 'SHOW CRUMPLE CRVS',  hideLabel: 'HIDE CRUMPLE CRVS' },
    };

    function syncCurveSetBtn(s) {
      s.btn.classList.toggle('populated',   s.group !== null);
      s.btn.classList.toggle('hidden-mesh', s.group !== null && !s.visible);
      s.btn.querySelector('.label').textContent = s.visible ? s.hideLabel : s.showLabel;
      if (s.group) s.group.visible = s.visible;
    }

    Object.values(curveSets).forEach(s => {
      s.btn.addEventListener('click', () => {
        if (!s.group) return;
        s.visible = !s.visible;
        syncCurveSetBtn(s);
      });
      syncCurveSetBtn(s);
    });

    // Depth cueing: each curve is split into short chunks; each chunk gets its
    // own LineMaterial whose opacity is set to the average depth of its points.
    // Chunks of ~10 points span a small arc so the average is locally accurate.
    const CHUNK_SIZE = 10;   // points per chunk (overlapping by 1 at joins)

    function updateAllCurveColors() {
      const camDir = camera.position.clone().normalize();
      Object.values(curveSets).forEach(s => {
        s.lineData.forEach(({ mat, points }) => {
          let sum = 0;
          points.forEach(p => { sum += p[0]*camDir.x + p[1]*camDir.y + p[2]*camDir.z; });
          const t = Math.max(0, Math.min(1,
            (sum / points.length - DEPTH_FAR) / (DEPTH_NEAR - DEPTH_FAR)));
          mat.opacity = t;
        });
      });
    }

    controls.addEventListener('change', updateAllCurveColors);

    function loadCurveSet(key, data) {
      const s = curveSets[key];
      if (s.group) scene.remove(s.group);
      s.lineData = [];
      const curves = typeof data === 'string' ? JSON.parse(data) : data;
      const group  = new THREE.Group();
      const res    = new THREE.Vector2(window.innerWidth, window.innerHeight);

      curves.forEach(curve => {
        const pts  = curve.points;
        const step = CHUNK_SIZE - 1;          // overlap by 1 point at each join
        for (let i = 0; i < pts.length - 1; i += step) {
          const chunk = pts.slice(i, Math.min(i + CHUNK_SIZE, pts.length));
          if (chunk.length < 2) continue;
          const geo = new LineGeometry();
          geo.setPositions(chunk.flat());
          const mat = new LineMaterial({
            color:       new THREE.Color(curve.color || 0xffffff),
            linewidth:   3,
            resolution:  res,
            transparent: true,
            depthWrite:  false,
            opacity:     1.0,
          });
          const line = new Line2(geo, mat);
          line.computeLineDistances();
          group.add(line);
          s.lineData.push({ mat, points: chunk });
        }
      });

      group.visible = s.visible;
      scene.add(group);
      s.group = group;
      syncCurveSetBtn(s);
      updateAllCurveColors();
    }
    // ─────────────────────────────────────────────────────────────────────────

    // ── Hamburger — toggle surface + curve panels ─────────────────────────────
    const hamburgerEl   = document.getElementById('hamburger');
    const uiRight       = document.getElementById('ui');
    const uiLeftEl      = document.getElementById('ui-left');
    const bottomCentreEl = document.getElementById('bottom-centre');
    let panelsVisible = true;

    hamburgerEl.addEventListener('click', () => {
      panelsVisible = !panelsVisible;
      uiRight.style.display        = panelsVisible ? 'flex' : 'none';
      uiLeftEl.style.display       = panelsVisible ? 'flex' : 'none';
      bottomCentreEl.style.display = panelsVisible ? 'flex' : 'none';
      // Pick buttons follow panels — only show if SELECT PTS is also on
      pickButtonsEl.style.display  = (panelsVisible && selectPtsOn) ? 'flex' : 'none';
      hamburgerEl.classList.toggle('panels-hidden', !panelsVisible);
      positionHamburger();
    });

    // On portrait, position hamburger just above the bottom-centre bar (when visible)
    function positionHamburger() {
      if (window.innerHeight > window.innerWidth) {
        const bcH = panelsVisible ? bottomCentreEl.offsetHeight : 0;
        hamburgerEl.style.bottom = (bcH + 32) + 'px';
      } else {
        hamburgerEl.style.bottom = '20px';
      }
    }
    window.addEventListener('resize', positionHamburger);
    setTimeout(positionHamburger, 100); // after first layout
    // ─────────────────────────────────────────────────────────────────────────

    // ── Welcome screen ────────────────────────────────────────────────────────
    const welcomeOverlay = document.getElementById('welcome-overlay');
    const welcomeText    = document.getElementById('welcome-text');

    function showSessionInfo(data) {
      const text = typeof data === 'string' ? data : JSON.stringify(data);
      welcomeText.textContent = text;
      welcomeOverlay.style.display = 'flex';
    }

    welcomeOverlay.addEventListener('click', () => {
      welcomeOverlay.style.display = 'none';
    });

    // Fetch stored session info immediately on load (before WebSocket fires)
    fetch('/session-info')
      .then(r => r.status === 204 ? null : r.text())
      .then(text => { if (text) showSessionInfo(text); })
      .catch(() => {});
    // ─────────────────────────────────────────────────────────────────────────

    // ── Point Select ─────────────────────────────────────────────────────────────
    const PICK_DEFS = {
      A: { hex: '#ff3030', three: 0xff3030, rgb: [1.0, 0.19, 0.19] },
      B: { hex: '#33ff66', three: 0x33ff66, rgb: [0.20, 1.0,  0.40] },
      C: { hex: '#4499ff', three: 0x4499ff, rgb: [0.27, 0.60, 1.0 ] }
    };
    const pickState = {
      A: { active: false, sphere: null, disc: null, sphere2: null, disc2: null },
      B: { active: false, sphere: null, disc: null, sphere2: null, disc2: null },
      C: { active: false, sphere: null, disc: null, sphere2: null, disc2: null }
    };

    // Shared disc geometry — radius 25, reused for all picks
    const discGeo = new THREE.CircleGeometry(25, 64);

    // Classic bullseye target — yellow / red / blue / black
    // Ring UV boundaries chosen so sphere (r=8, UV=0.32) lands exactly
    // on the red→blue edge, covering the two inner rings.
    const targetDiscMaterial = new THREE.ShaderMaterial({
      transparent: true, depthWrite: false, side: THREE.DoubleSide,
      polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1,
      vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
      `,
      fragmentShader: `
        varying vec2 vUv;
        void main() {
          float d = length(vUv - vec2(0.5)) * 2.0;
          float fw = fwidth(d) * 1.5;
          if (d > 1.0) { gl_FragColor = vec4(0.0); return; }
          vec3 col;
          if      (d < 0.16) col = vec3(1.00, 0.86, 0.00); // yellow (inner)
          else if (d < 0.32) col = vec3(0.88, 0.06, 0.06); // red
          else if (d < 0.66) col = vec3(0.12, 0.25, 0.80); // blue
          else               col = vec3(0.00, 0.00, 0.00); // black (outer)
          float alpha = 1.0 - smoothstep(1.0 - fw, 1.0, d);
          gl_FragColor = vec4(col, alpha);
        }
      `
    });
    let activePickKey  = null;
    let selectPtsOn    = false;  // master visibility

    const selectPtsBtn  = document.getElementById('select-pts-btn');
    const pickButtonsEl = document.getElementById('pick-buttons');
    const raycaster     = new THREE.Raycaster();
    const mouse         = new THREE.Vector2();

    // Master toggle — show/hide pick row and all spheres; clear active pick mode
    selectPtsBtn.addEventListener('click', () => {
      selectPtsOn = !selectPtsOn;
      selectPtsBtn.classList.toggle('populated', selectPtsOn);
      pickButtonsEl.classList.toggle('visible', selectPtsOn);
      if (!selectPtsOn) {
        if (activePickKey) {
          document.getElementById('pick-' + activePickKey.toLowerCase()).classList.remove('active');
          activePickKey    = null;
          controls.enabled = true;
        }
        for (const key of ['A','B','C']) {
          if (pickState[key].sphere)  pickState[key].sphere.visible  = false;
          if (pickState[key].disc)    pickState[key].disc.visible    = false;
          if (pickState[key].sphere2) pickState[key].sphere2.visible = false;
          if (pickState[key].disc2)   pickState[key].disc2.visible   = false;
        }
      } else {
        for (const key of ['A','B','C']) {
          if (pickState[key].sphere)  pickState[key].sphere.visible  = true;
          if (pickState[key].disc)    pickState[key].disc.visible    = true;
          if (pickState[key].sphere2) pickState[key].sphere2.visible = true;
          if (pickState[key].disc2)   pickState[key].disc2.visible   = true;
        }
      }
    });

    // Per-colour pick buttons
    for (const key of ['A','B','C']) {
      document.getElementById('pick-' + key.toLowerCase()).addEventListener('click', () => {
        if (!selectPtsOn) {
          // Auto-enable master toggle on first pick button press
          selectPtsOn = true;
          selectPtsBtn.classList.add('populated');
          pickButtonsEl.classList.add('visible');
        }
        if (activePickKey === key) {
          // Second click without pick: clear sphere + disc (both sides) + deactivate
          if (pickState[key].sphere)  { scene.remove(pickState[key].sphere);  pickState[key].sphere  = null; }
          if (pickState[key].disc)    { scene.remove(pickState[key].disc);    pickState[key].disc    = null; }
          if (pickState[key].sphere2) { scene.remove(pickState[key].sphere2); pickState[key].sphere2 = null; }
          if (pickState[key].disc2)   { scene.remove(pickState[key].disc2);   pickState[key].disc2   = null; }
          document.getElementById('pick-' + key.toLowerCase()).classList.remove('active','placed');
          activePickKey    = null;
          controls.enabled = true;
        } else {
          // Deactivate any other active key
          if (activePickKey) {
            document.getElementById('pick-' + activePickKey.toLowerCase()).classList.remove('active');
          }
          activePickKey    = key;
          controls.enabled = false;
          document.getElementById('pick-' + key.toLowerCase()).classList.add('active');
        }
      });
    }

    function getPickableMeshes() {
      const meshes = [];
      for (const key of ['shell','crumple','headform','iso_hf_a','iso_hf_b']) {
        const t = targets[key];
        if (t && t.root && t.visible) {
          t.root.traverse(child => { if (child.isMesh) meshes.push(child); });
        }
      }
      return meshes;
    }

    function handlePick(clientX, clientY) {
      if (!activePickKey) return;
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x =  ((clientX - rect.left)  / rect.width)  * 2 - 1;
      mouse.y = -((clientY - rect.top)   / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(getPickableMeshes(), false);
      if (!hits.length) return;

      const key = activePickKey;
      const pt  = hits[0].point;
      // Three.js → Rhino space: X=x, Y=-z, Z=y
      const rx = pt.x, ry = -pt.z, rz = pt.y;

      // Remove old sphere + disc (both sides) for this slot
      if (pickState[key].sphere)  scene.remove(pickState[key].sphere);
      if (pickState[key].disc)    scene.remove(pickState[key].disc);
      if (pickState[key].sphere2) scene.remove(pickState[key].sphere2);
      if (pickState[key].disc2)   scene.remove(pickState[key].disc2);

      // Surface normal at hit point
      const normal = hits[0].face.normal.clone()
        .transformDirection(hits[0].object.matrixWorld).normalize();
      // Mirrored normal: negate X (YZ-plane symmetry)
      const normalM = new THREE.Vector3(-normal.x, normal.y, normal.z).normalize();

      // ── Primary side ──────────────────────────────────────────────────────────
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(8, 12, 12),
        new THREE.MeshBasicMaterial({ color: PICK_DEFS[key].three })
      );
      sphere.position.copy(pt);
      scene.add(sphere);
      pickState[key].sphere = sphere;

      const disc = new THREE.Mesh(discGeo, targetDiscMaterial);
      disc.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), normal);
      disc.position.copy(pt).addScaledVector(normal, 0.5);
      scene.add(disc);
      pickState[key].disc = disc;

      // ── Mirrored side (X → -X) ────────────────────────────────────────────────
      const ptM = new THREE.Vector3(-pt.x, pt.y, pt.z);

      const sphere2 = new THREE.Mesh(
        new THREE.SphereGeometry(8, 12, 12),
        new THREE.MeshBasicMaterial({ color: PICK_DEFS[key].three })
      );
      sphere2.position.copy(ptM);
      scene.add(sphere2);
      pickState[key].sphere2 = sphere2;

      const disc2 = new THREE.Mesh(discGeo, targetDiscMaterial);
      disc2.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), normalM);
      disc2.position.copy(ptM).addScaledVector(normalM, 0.5);
      scene.add(disc2);
      pickState[key].disc2 = disc2;

      // Update button state
      const btn = document.getElementById('pick-' + key.toLowerCase());
      btn.classList.remove('active');
      btn.classList.add('placed');

      // Transmit
      fetch('/pick-point', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ label: 'Pickpoint ' + key, x: rx, y: ry, z: rz })
      }).catch(() => {});

      activePickKey    = null;
      controls.enabled = true;
    }

    renderer.domElement.addEventListener('click', e => { handlePick(e.clientX, e.clientY); });
    renderer.domElement.addEventListener('touchend', e => {
      if (e.changedTouches.length === 1)
        handlePick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }, { passive: true });
    // ─────────────────────────────────────────────────────────────────────────

    // --- WebSocket ---
    const statusText  = document.getElementById('status-text');
    const statusInner = document.getElementById('status-inner');
    const proto       = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const WS_URL      = `${proto}//${window.location.host}`;
    let ws;

    function setStatus(text, color) {
      statusText.textContent    = text;
      statusInner.style.color   = color;
    }

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen  = () => setStatus('LIVE', '#8f8');
      ws.onclose = () => {
        setStatus('CONNECTING', '#fa0');
        setTimeout(connect, 2000);
      };
      ws.onerror = () => ws.close();
      ws.onmessage = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'shell')        loadMesh('shell',    msg.data);
        if (msg.type === 'crumple')      loadMesh('crumple',  msg.data);
        if (msg.type === 'headform')     loadMesh('headform', msg.data);
        if (msg.type === 'head')         loadMesh('head',     msg.data);
        if (msg.type === 'iso-hf-a')     loadMesh('iso_hf_a', msg.data);
        if (msg.type === 'iso-hf-b')     loadMesh('iso_hf_b', msg.data);
        if (msg.type === 'curves')         loadCurveSet('profile',     msg.data);
        if (msg.type === 'crumple-curves') loadCurveSet('crumpleCrvs', msg.data);
        if (msg.type === 'session-info')   showSessionInfo(msg.data);
      };
    }

    connect();

    // --- Polling fallback (handles Passenger multi-worker broadcast miss) ---
    const pollSeen = {};
    async function pollState() {
      try {
        const res = await fetch('/state');
        if (!res.ok) return;
        const ts = await res.json();
        for (const [key, t] of Object.entries(ts)) {
          if (!t) continue;
          if ((pollSeen[key] || 0) >= t) continue;
          pollSeen[key] = t;
          // Fetch and load the updated asset
          const assetRes = await fetch('/' + (key === 'shell' ? 'upload' : 'upload-' + key));
          if (!assetRes.ok) continue;
          const body = await assetRes.text();
          if (!body) continue;
          if (key === 'shell')            loadMesh('shell',    body);
          else if (key === 'crumple')     loadMesh('crumple',  body);
          else if (key === 'headform')    loadMesh('headform', body);
          else if (key === 'head')        loadMesh('head',     body);
          else if (key === 'iso-hf-a')    loadMesh('iso_hf_a', body);
          else if (key === 'iso-hf-b')    loadMesh('iso_hf_b', body);
          else if (key === 'curves')        loadCurveSet('profile',     body);
          else if (key === 'crumple-curves') loadCurveSet('crumpleCrvs', body);
          else if (key === 'session-info')   showSessionInfo(body);
        }
      } catch(e) { /* silent — network hiccup */ }
    }
    setInterval(pollState, 3000);
    pollState(); // immediate first poll on load

    // --- Render loop ---
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
