<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Helmet Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #ccc; font-family: monospace; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; }
    #ui {
      position: fixed; top: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    }
    #status {
      background: #222; border: 1px solid #444;
      padding: 6px 10px; font-size: 11px; letter-spacing: 0.05em;
    }
    button {
      background: #222; border: 1px solid #555; color: #ccc;
      padding: 8px 14px; font-family: monospace; font-size: 11px;
      cursor: pointer; letter-spacing: 0.05em;
    }
    button:hover { background: #333; border-color: #888; }
    button:disabled { opacity: 0.4; cursor: default; }
    #waiting {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 13px; letter-spacing: 0.1em; color: #555;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="waiting">WAITING FOR MODEL</div>
  <div id="ui">
    <div id="status">DISCONNECTED</div>
    <button id="dl-btn" disabled>DOWNLOAD OBJ</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Scene Setup ---
    const container = document.getElementById('canvas-container');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 400);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const key = new THREE.DirectionalLight(0xffffff, 1.2);
    key.position.set(1, 2, 2);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x8899bb, 0.4);
    fill.position.set(-2, 0, -1);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 0.3);
    rim.position.set(0, -1, -2);
    scene.add(rim);

    // Grid reference
    const grid = new THREE.GridHelper(500, 20, 0x333333, 0x2a2a2a);
    scene.add(grid);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Mesh Management ---
    let currentObj = null;
    let currentObjString = null;
    const loader = new OBJLoader();
    const material = new THREE.MeshStandardMaterial({
      color: 0xcccccc, roughness: 0.6, metalness: 0.1, side: THREE.DoubleSide
    });

    function loadOBJ(objString) {
      if (currentObj) scene.remove(currentObj);
      const obj = loader.parse(objString);
      obj.traverse(child => {
        if (child.isMesh) child.material = material;
      });

      // Auto-center and fit camera
      const box = new THREE.Box3().setFromObject(obj);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      obj.position.sub(center);
      grid.position.y = -size.y / 2;

      const fov = camera.fov * (Math.PI / 180);
      camera.position.set(0, 0, (maxDim / 2) / Math.tan(fov / 2) * 1.5);
      controls.reset();

      scene.add(obj);
      currentObj = obj;
      currentObjString = objString;

      document.getElementById('waiting').style.display = 'none';
      document.getElementById('dl-btn').disabled = false;
    }

    // --- Download ---
    document.getElementById('dl-btn').addEventListener('click', () => {
      if (!currentObjString) return;
      const blob = new Blob([currentObjString], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'helmet.obj';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // --- WebSocket ---
    const statusEl = document.getElementById('status');
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const WS_URL = `${proto}//${window.location.host}`;
    let ws;

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => { statusEl.textContent = 'LIVE'; statusEl.style.color = '#8f8'; };
      ws.onclose = () => {
        statusEl.textContent = 'RECONNECTING';
        statusEl.style.color = '#fa0';
        setTimeout(connect, 2000);
      };
      ws.onerror = () => ws.close();

      ws.onmessage = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'mesh') loadOBJ(msg.data);
      };
    }

    connect();

    // --- Render Loop ---
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
