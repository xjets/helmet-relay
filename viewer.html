<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Helmet Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #ccc; font-family: monospace; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; }

    #ui {
      position: fixed; top: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    }
    #status {
      background: #222; border: 1px solid #444;
      padding: 6px 10px; font-size: 11px; letter-spacing: 0.05em;
    }
    button {
      background: #222; border: 1px solid #555; color: #ccc;
      padding: 8px 14px; font-family: monospace; font-size: 11px;
      cursor: pointer; letter-spacing: 0.05em;
    }
    button:hover { background: #333; border-color: #888; }
    button:disabled { opacity: 0.4; cursor: default; }

    #waiting {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 13px; letter-spacing: 0.1em; color: #555;
      pointer-events: none;
    }

    /* Matcap swatch bar */
    #matcap-bar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      background: rgba(20,20,20,0.75); border: 1px solid #333;
      padding: 10px 14px; backdrop-filter: blur(4px);
    }
    .swatch {
      width: 48px; height: 48px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      background-size: cover; background-position: center;
      transition: border-color 0.15s, transform 0.15s;
    }
    .swatch:hover { transform: scale(1.12); border-color: #888; }
    .swatch.active { border-color: #fff; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="waiting">WAITING FOR MODEL</div>

  <div id="ui">
    <div id="status">DISCONNECTED</div>
    <button id="headform-toggle" type="button" disabled>HIDE HEADFORM</button>
    <button id="dl-btn" disabled>DOWNLOAD OBJ</button>
  </div>

  <div id="matcap-bar">
    <!-- swatches injected by JS -->
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Matcap list — rename files to match, or edit these names ───────────
    const MATCAPS = [
      'BaseMatCap_102.png',
      'BaseMatCap_106.png',
      'BaseMatCap_110.png',
      'BaseMatCap_111.png',
      'BaseMatCap_112.png',
      'BaseMatCap_115.png',
    ];
    const DEFAULT_MATCAP = 0;  // index into MATCAPS (helmet only)
    const HEADFORM_MATCAP = 'BaseMatCap_102.png';  // headform never uses swatches
    // ─────────────────────────────────────────────────────────────────────────

    // --- Scene Setup ---
    const container = document.getElementById('canvas-container');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    // Start 180° around Y vs +Z so we face the front of the head (not the back).
    camera.position.set(0, 0, -400);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    // Lighting (used if fallback to standard material)
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(1, 2, 2);
    scene.add(keyLight);

    // Grid reference
    const grid = new THREE.GridHelper(500, 20, 0x333333, 0x2a2a2a);
    scene.add(grid);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Material ---
    const texLoader = new THREE.TextureLoader();
    const headformMaterial = new THREE.MeshMatcapMaterial({ side: THREE.DoubleSide });
    texLoader.load('/matcaps/' + HEADFORM_MATCAP, tex => {
      headformMaterial.matcap = tex;
      headformMaterial.needsUpdate = true;
    });
    let activeMaterial = new THREE.MeshMatcapMaterial({ side: THREE.DoubleSide });

    function applyMatcap(index) {
      texLoader.load('/matcaps/' + MATCAPS[index], tex => {
        activeMaterial.matcap = tex;
        activeMaterial.needsUpdate = true;
      });
      // Update swatch highlight
      document.querySelectorAll('.swatch').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
    }

    // --- Build swatch bar ---
    const bar = document.getElementById('matcap-bar');
    MATCAPS.forEach((name, i) => {
      const div = document.createElement('div');
      div.className = 'swatch';
      div.style.backgroundImage = `url('/matcaps/${name}')`;
      div.title = name;
      div.addEventListener('click', () => applyMatcap(i));
      bar.appendChild(div);
    });

    // Load default matcap
    applyMatcap(DEFAULT_MATCAP);

    // --- Mesh Management (file coords preserved: origin 0,0,0, no scale) ---
    const HEADFORM_URL = '/mesh/headform.obj';
    let headformRoot = null;
    let helmetRoot = null;
    let currentObjString = null;
    const loader = new OBJLoader();

    const headformBtn = document.getElementById('headform-toggle');
    const waitingEl = document.getElementById('waiting');

    function applyMaterialToMeshes(obj, material) {
      obj.traverse(child => {
        if (child.isMesh) child.material = material;
      });
    }

    function syncHeadformButton() {
      if (!headformRoot) return;
      headformBtn.disabled = false;
      headformBtn.textContent = headformRoot.visible ? 'HIDE HEADFORM' : 'SHOW HEADFORM';
    }

    headformBtn.addEventListener('click', () => {
      if (!headformRoot) return;
      headformRoot.visible = !headformRoot.visible;
      syncHeadformButton();
    });

    function loadHelmet(objString) {
      if (helmetRoot) scene.remove(helmetRoot);
      const obj = loader.parse(objString);
      applyMaterialToMeshes(obj, activeMaterial);
      scene.add(obj);
      helmetRoot = obj;
      currentObjString = objString;
      document.getElementById('dl-btn').disabled = false;
    }

    fetch(HEADFORM_URL)
      .then(r => {
        if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
        return r.text();
      })
      .then(text => {
        headformRoot = loader.parse(text);
        applyMaterialToMeshes(headformRoot, headformMaterial);
        headformRoot.visible = true;
        scene.add(headformRoot);
        syncHeadformButton();
        waitingEl.style.display = 'none';
      })
      .catch(() => {
        waitingEl.textContent = 'HEADFORM LOAD FAILED (' + HEADFORM_URL + ')';
      });

    // --- Download ---
    document.getElementById('dl-btn').addEventListener('click', () => {
      if (!currentObjString) return;
      const blob = new Blob([currentObjString], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'helmet.obj';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // --- WebSocket ---
    const statusEl = document.getElementById('status');
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const WS_URL = `${proto}//${window.location.host}`;
    let ws;

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => { statusEl.textContent = 'LIVE'; statusEl.style.color = '#8f8'; };
      ws.onclose = () => {
        statusEl.textContent = 'RECONNECTING';
        statusEl.style.color = '#fa0';
        setTimeout(connect, 2000);
      };
      ws.onerror = () => ws.close();
      ws.onmessage = e => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'mesh') loadHelmet(msg.data);
      };
    }

    connect();

    // --- Render Loop ---
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
